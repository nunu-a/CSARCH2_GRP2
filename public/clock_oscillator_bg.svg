<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <rect width="1200" height="800" fill="#0d111a" />
  
  <!-- Subtle grid lines background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161f33" stroke-width="1" />
    </pattern>
    
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="20" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#grid)" opacity="0.5" />

  <g transform="translate(100, 150)">
    <!-- Circuit Traces Connecting Oscillator to CPU -->
    <!-- Top trace loop -->
    <path d="M 230 190 L 230 90 L 410 90 L 460 140 L 460 210 L 530 210" fill="none" stroke="#00ffc8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
    <path d="M 200 170 L 200 60 L 430 60 L 490 120 L 490 230 L 530 230" fill="none" stroke="#00ffc8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
    <path d="M 170 170 L 170 30 L 450 30 L 520 100 L 520 250 L 530 250" fill="none" stroke="#00ffc8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />

    <!-- Bottom trace loop -->
    <path d="M 170 350 L 170 470 L 450 470 L 520 400 L 520 310 L 530 310" fill="none" stroke="#00ffc8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
    <path d="M 200 350 L 200 440 L 430 440 L 490 380 L 490 290 L 530 290" fill="none" stroke="#00ffc8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
    <path d="M 230 330 L 230 410 L 410 410 L 460 360 L 460 270 L 530 270" fill="none" stroke="#00ffc8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />

    <!-- Glowing Crystal Oscillator Component (Left) -->
    <g id="oscillator" filter="url(#neon-glow)">
      <!-- Pins/Leads -->
      <path d="M 110 330 L 110 420" stroke="#00ffc8" stroke-width="12" stroke-linecap="round" />
      <path d="M 210 330 L 210 420" stroke="#00ffc8" stroke-width="12" stroke-linecap="round" />
      
      <!-- Outer Metal Can Package -->
      <rect x="50" y="190" width="220" height="140" rx="35" fill="#0d111a" stroke="#00ffc8" stroke-width="8" />
      <!-- Flange Base -->
      <rect x="40" y="310" width="240" height="24" rx="12" fill="#0d111a" stroke="#00ffc8" stroke-width="8" />
      
      <!-- Inner Quartz Element Outline -->
      <rect x="75" y="215" width="170" height="70" rx="10" fill="none" stroke="#00ffc8" stroke-width="4" opacity="0.9" />
    </g>

    <!-- CPU Microchip Package (Right) -->
    <g id="cpu" transform="translate(530, 80)" opacity="0.4" filter="url(#soft-glow)">
      <!-- Outer CPU Substrate -->
      <rect x="0" y="0" width="340" height="340" rx="16" fill="#0d111a" stroke="#4a5a75" stroke-width="6" />
      <rect x="20" y="20" width="300" height="300" rx="10" fill="none" stroke="#2d3b54" stroke-width="4" />
      <rect x="40" y="40" width="260" height="260" rx="6" fill="none" stroke="#2d3b54" stroke-width="2" />
      
      <!-- Die in Center -->
      <rect x="110" y="110" width="120" height="120" rx="6" fill="#141c2e" stroke="#4a5a75" stroke-width="4" />
      
      <!-- Internal Die Traces -->
      <!-- Left side -->
      <path d="M 40 90 L 110 90 M 40 120 L 110 120 M 40 150 L 110 150 M 40 180 L 110 180 M 40 210 L 110 210 M 40 240 L 110 240 M 40 270 L 110 270" stroke="#3b4c66" stroke-width="3" />
      <!-- Right side -->
      <path d="M 300 90 L 230 90 M 300 120 L 230 120 M 300 150 L 230 150 M 300 180 L 230 180 M 300 210 L 230 210 M 300 240 L 230 240 M 300 270 L 230 270" stroke="#3b4c66" stroke-width="3" />
      <!-- Top side -->
      <path d="M 90 40 L 90 110 M 120 40 L 120 110 M 150 40 L 150 110 M 180 40 L 180 110 M 210 40 L 210 110 M 240 40 L 240 110 M 270 40 L 270 110" stroke="#3b4c66" stroke-width="3" />
      <!-- Bottom side -->
      <path d="M 90 300 L 90 230 M 120 300 L 120 230 M 150 300 L 150 230 M 180 300 L 180 230 M 210 300 L 210 230 M 240 300 L 240 230 M 270 300 L 270 230" stroke="#3b4c66" stroke-width="3" />
    </g>
  </g>
</svg>
